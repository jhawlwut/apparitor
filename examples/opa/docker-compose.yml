# Local OPA PDP: the official OPA binary behind a tiny AuthZEN gateway (see gateway/).
# Built locally rather than pulled — OPA has no native AuthZEN endpoint, so the gateway
# translates AuthZEN onto `opa eval` over the vendored policy. The OPA binary itself comes
# from the digest-pinned official image (see gateway/Dockerfile).
services:
  opa-gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8080:8080" # AuthZEN /access/v1/evaluation
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request as u,sys; sys.exit(0 if u.urlopen('http://localhost:8080/healthz').status==200 else 1)
      interval: 3s
      timeout: 3s
      retries: 20
