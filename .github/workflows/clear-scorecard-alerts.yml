# One-shot maintenance workflow: dismisses the orphaned OpenSSF Scorecard code-scanning
# alerts left behind when the Scorecard workflow was removed. Scorecard no longer runs, so
# its alerts can never be auto-closed by a fresh (empty) analysis — the category/tool tuple
# of a manual upload does not match the original uploads. Instead this dismisses them
# directly via the code-scanning REST API. Trigger via Actions -> "Clear Scorecard alerts"
# -> Run workflow. Safe to re-run: only OPEN alerts whose tool name is exactly Scorecard are
# touched; CodeQL (or any other tool's) alerts are left alone.
name: Clear Scorecard alerts

on:
  workflow_dispatch:

permissions:
  security-events: write

jobs:
  clear:
    runs-on: ubuntu-latest
    steps:
      - name: Dismiss open Scorecard code-scanning alerts
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${REPO}/code-scanning/alerts"
          auth=(-H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28")

          # Diagnostic: surface the tool names of currently-open alerts so a zero-dismissal
          # run is self-explaining (e.g. if the tool name is not "Scorecard" as assumed).
          echo "Tool names among open alerts:"
          curl -fsS "${auth[@]}" "${api}?state=open&per_page=100" \
            | jq -r '[.[].tool.name] | unique | .[]' || true

          # Dismissal reason must be one of GitHub's accepted values.
          cat > payload.json <<'JSON'
          {"state":"dismissed","dismissed_reason":"won't fix","dismissed_comment":"OpenSSF Scorecard workflow was removed; dismissing orphaned supply-chain alerts."}
          JSON

          # Walk every page of open alerts and collect the exact-Scorecard alert numbers
          # first. The match is exact (case-insensitive) — a tool merely *containing*
          # "scorecard" (e.g. "scorecard-wrapper") is ignored. Collecting all numbers before
          # dismissing any means the PATCHes below are unaffected by pagination shifting as
          # alerts move out of the open set.
          nums=""
          page=1
          while :; do
            resp="$(curl -fsS "${auth[@]}" "${api}?state=open&per_page=100&page=${page}")"
            [ "$(printf '%s' "$resp" | jq 'length')" -eq 0 ] && break
            page_nums="$(printf '%s' "$resp" \
              | jq -r '.[] | select((.tool.name // "" | ascii_downcase) == "scorecard") | .number')"
            [ -n "$page_nums" ] && nums="${nums}${page_nums}"$'\n'
            page=$((page + 1))
          done

          total=0
          for num in $nums; do
            curl -fsS -X PATCH "${auth[@]}" "${api}/${num}" -d @payload.json >/dev/null
            echo "Dismissed Scorecard alert #${num}"
            total=$((total + 1))
          done
          echo "Total Scorecard alerts dismissed: ${total}"
