name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      # Actions are version-pinned; Dependabot (see .github/dependabot.yml) keeps
      # them current and can pin to commit SHAs.
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Ruff (format check)
        run: ruff format --check .

  types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Mypy (strict)
        run: mypy src/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      # LlamaFirewall (heavy ML stack) is intentionally NOT installed here — the
      # LlamaFirewall-free modules are the unit-test surface. The scaffold's import
      # guard is exercised by test_smoke. A separate job (added with the behavioural
      # suite) will install [llamafirewall] and run the scanner contract tests.
      - run: pip install -e ".[dev]"
      - name: Pytest (unit; integration excluded by default)
        run: pytest

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build twine
      - run: python -m build
      - name: Twine check
        run: twine check dist/*

  # The scanner's only hard dependency is LlamaFirewall (a heavy ML stack), so its
  # boundary test runs in a dedicated job that installs the [llamafirewall] extra. Kept
  # off the default push/PR path to keep the merge gate fast; run on demand.
  scanner:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev,llamafirewall]"
      - name: Pytest (scanner boundary, with LlamaFirewall)
        run: pytest tests/unit/test_scanner.py -p no:cacheprovider --no-cov

  # Integration tests need real PDPs via Docker. Kept off the default path; auto-skips
  # via conftest when no daemon is present, so it never blocks the merge gate.
  integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Pytest (integration)
        run: pytest -m integration
