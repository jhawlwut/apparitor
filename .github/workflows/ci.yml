name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      # Actions are version-pinned; Dependabot (see .github/dependabot.yml) keeps
      # them current and can pin to commit SHAs.
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Ruff (format check)
        run: ruff format --check .

  types:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Mypy (strict)
        run: mypy src/

  # Verify the package works against the declared minimum dependency versions
  # (httpx/pydantic/respx floors), not just the latest resolve.
  min-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]" "httpx==0.27.*" "pydantic==2.5.*" "respx==0.21.*"
      - name: Pytest (minimum dependency versions)
        run: pytest

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      # LlamaFirewall (heavy ML stack) is intentionally NOT installed here — the
      # LlamaFirewall-free modules are the unit-test surface. The scaffold's import
      # guard is exercised by test_smoke. A separate job (added with the behavioural
      # suite) will install [llamafirewall] and run the scanner contract tests.
      - run: pip install -e ".[dev]"
      - name: Pytest (unit; integration excluded by default)
        run: pytest --cov-report=xml
      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build twine
      - run: python -m build
      - name: Twine check
        run: twine check dist/*
      # Generate + schema-validate the CycloneDX SBOM on every build so the runtime
      # dependency tree (and the generator script) stay green continuously, not just at
      # release. Writes to sbom/ — never dist/, which the release job publishes to PyPI.
      - name: Generate SBOM (CycloneDX, runtime tree)
        run: scripts/generate_sbom.sh
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom/apparitor.cdx.json

  # The scanner's only hard dependency is LlamaFirewall (a heavy ML stack), so its
  # end-to-end test runs in a dedicated job that installs the [llamafirewall] extra.
  # CPU-only torch keeps the install lighter than the default CUDA wheels.
  scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - name: Install CPU-only torch then the scanner with LlamaFirewall
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,llamafirewall]"
      - name: Pytest (scanner end-to-end, with LlamaFirewall)
        run: pytest tests/unit/test_scanner.py -p no:cacheprovider --no-cov

  # The native Cedar backend's only hard dependency is cedarpy (a Rust/PyO3 wheel over the
  # Cedar engine), so its in-process test runs in a dedicated job that installs the [cedar]
  # extra — keeping it out of the default [dev] run, like the scanner job.
  cedar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev,cedar]"
      - name: Pytest (Cedar in-process backend, with cedarpy)
        run: pytest tests/unit/test_cedar_backend.py -p no:cacheprovider --no-cov

  # The NeMo Guardrails rail adapter's only hard dependency is nemoguardrails, so its
  # end-to-end test runs in a dedicated job that installs the [nemo] extra — keeping it out of
  # the default [dev] run, like the scanner and cedar jobs.
  nemo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev,nemo]"
      - name: Pytest (NeMo Guardrails rail adapter, with nemoguardrails)
        run: pytest tests/unit/test_nemo_backend.py -p no:cacheprovider --no-cov

  # The FastMCP middleware adapter's only hard dependency is fastmcp, so its end-to-end test
  # runs in a dedicated job that installs the extra — keeping it out of the default [dev] run,
  # like the scanner, cedar and nemo jobs. The matrix exercises both supported lines (the last
  # maintained 2.x and current 3.x); drop the 2.x leg when the pin floor moves to 3.
  fastmcp:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        fastmcp-version: ["fastmcp==2.14.*", "fastmcp>=3.1,<4"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      # Install the extra (so a broken `[fastmcp]` spec fails here) and intersect it with the
      # matrix leg's version constraint.
      - run: pip install -e ".[dev,fastmcp]" "${{ matrix.fastmcp-version }}"
      # Fail loudly if the resolve left fastmcp unimportable: otherwise importorskip would
      # silently skip the whole suite and the job would go green having tested nothing.
      - name: Verify fastmcp imports
        run: python -c "import fastmcp, apparitor.fastmcp; print(fastmcp.__version__)"
      - name: Pytest (FastMCP middleware adapter, with fastmcp)
        run: pytest tests/unit/test_fastmcp_middleware.py tests/unit/test_smoke.py -p no:cacheprovider --no-cov

  # Proof of the core thesis: ONE policy (examples/cedar/policies.cedar), ONE engine, THREE
  # enforcement points agreeing on the same verdicts. Installs every PEP extra (CPU-only
  # torch keeps LlamaFirewall light) and requires all three lanes to run (REQUIRE_ALL).
  three-pep-demo:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - name: Install CPU-only torch then every enforcement-point extra
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[llamafirewall,nemo,fastmcp,cedar]"
      - name: Run the three-PEP portability demo
        env:
          APPARITOR_DEMO_REQUIRE_ALL: "1"
        run: python examples/three-peps/demo.py

  # Proves the proxy chokepoint works on both supported fastmcp lines: the denied tool
  # is hidden from tools/list, allowed calls reach the upstream, denied calls do not.
  gateway-demo:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        fastmcp-version: ["fastmcp==2.14.*", "fastmcp>=3.1,<4"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[fastmcp]" "${{ matrix.fastmcp-version }}"
      - name: Verify fastmcp imports
        run: python -c "import fastmcp, apparitor.fastmcp; print(fastmcp.__version__)"
      - name: Run the gateway demo
        run: python examples/gateway/demo.py

  # Proves the client-side contract (core install only, no extras): fail-closed on
  # unparseable input and PDP errors, all-or-nothing batch aggregation, dual-principal AND.
  scenarios:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      # Core only — that is the point: no optional extras needed for this walk-through.
      - run: pip install -e .
      - name: Run the scenario walk-through
        run: python examples/scenarios/run.py

  # The A2A executor adapter's only hard dependency is a2a-sdk, so its end-to-end test runs
  # in a dedicated job that installs the extra — keeping it out of the default [dev] run,
  # like the scanner, cedar, nemo and fastmcp jobs. The SDK's own [http-server] extra powers
  # the in-process JSON-RPC harness the tests drive.
  a2a:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # The declared floor stays verified even after newer 1.x releases ship.
        a2a-version: ["a2a-sdk[http-server]==1.1.*", "a2a-sdk[http-server]>=1.1,<2"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev,a2a]" "${{ matrix.a2a-version }}"
      - name: Verify a2a imports
        run: python -c "import a2a, apparitor.a2a; print('a2a-sdk ok')"
      - name: Pytest (A2A executor adapter, with a2a-sdk)
        run: pytest tests/unit/test_a2a_executor.py tests/unit/test_smoke.py -p no:cacheprovider --no-cov

  # Integration tests need real PDPs via Docker. Kept off the default path; auto-skips
  # via conftest when no daemon is present, so it never blocks the merge gate.
  integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev,integration]"
      - name: Pytest (integration)
        # --no-cov: the package-wide coverage gate in addopts is meaningless for an
        # integration-only run (a handful of e2e tests can't hit 90%); the unit `test`
        # job owns that gate. Same treatment as the `scanner` job.
        run: pytest -m integration --no-cov

  # Real OpenFGA E2E without Docker: runs a pinned, SHA-256-verified OpenFGA release binary
  # directly (only github.com egress needed), so the integration test works where the Docker
  # registry is unreachable. Manual dispatch like `integration`, so it stays off the merge gate.
  integration-native:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      # No Docker or testcontainers — the native backend fetches the pinned binary with the
      # stdlib and talks to it with httpx, both already covered by the base + [dev] install.
      - run: pip install -e ".[dev]"
      - name: Pytest (OpenFGA integration via native binary)
        env:
          APPARITOR_OPENFGA_NATIVE: "1"
        run: pytest tests/integration/test_openfga.py -m integration --no-cov
