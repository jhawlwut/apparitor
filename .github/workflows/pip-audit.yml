# pip-audit (PyPA) — audits the installed dependency tree against the Python Packaging
# Advisory Database (PyPI/OSV) and fails on a known vulnerability. This is real dependency
# scanning, not a vanity badge: the weekly run catches CVEs disclosed after a dependency was
# last touched.
#
# Actions are pinned by commit SHA (Dependabot keeps them current via the version comment).
name: pip-audit

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

permissions:
  contents: read

jobs:
  audit:
    name: pip-audit (dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Resolve the runtime dependency tree
        run: |
          uv pip install --system .
          # Audits the core runtime deps only — the optional `[llamafirewall]` extra (a heavy
          # ML stack) is not installed here, so its CVEs are out of scope for this fast gate.
          # `pip freeze` also omits pip/setuptools/wheel (CI build tooling, not shipped deps),
          # keeping the gate focused and stable.
          pip freeze --exclude apparitor > requirements-audit.txt

      - name: Audit dependencies
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: requirements-audit.txt
