# Atheris fuzzing of the untrusted-input parsers (see fuzz/README.md). A short, bounded run
# on every PR catches input that crashes or hangs a parser; the weekly run digs deeper.
# Atheris ships manylinux wheels for CPython up to 3.11, so the job pins 3.11 (no clang build).
#
# Actions are pinned by commit SHA (Dependabot keeps them current via the version comment).
name: fuzz

on:
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        harness:
          - fuzz_pdp_response
          - fuzz_url_guard
          - fuzz_tool_calls
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      # Core install only — the fuzzed parsers (client, models, adapters) are
      # LlamaFirewall-free, so no optional extra is needed.
      - run: pip install -e . atheris==3.0.0
      - name: Fuzz ${{ matrix.harness }}
        run: python fuzz/${{ matrix.harness }}.py -max_total_time=60 -timeout=25
