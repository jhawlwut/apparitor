name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build twine
      - run: python -m build
      - run: twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
      # Ship a CycloneDX SBOM of the runtime dependency tree alongside the release. Written
      # to sbom/ (not dist/) so it is not fed to `twine upload` in the publish job.
      - name: Generate SBOM (CycloneDX, runtime tree)
        run: scripts/generate_sbom.sh
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom/authzen-llamafirewall-scanner.cdx.json

  publish:
    needs: build
    runs-on: ubuntu-latest
    # PyPI Trusted Publishing (OIDC): no API token needed. Configure the publisher
    # in the PyPI project settings and create a "pypi" environment in repo settings.
    environment: pypi
    permissions:
      # OIDC for PyPI Trusted Publishing. Add `contents: write` only if a step also
      # creates a GitHub Release.
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  # Attach the CycloneDX SBOM to the GitHub Release so it is durable and discoverable next to
  # the release, not a transient build artifact. Tagged releases only — a workflow_dispatch
  # run has no tag/release to attach to. Uses the first-party `gh` CLI (no extra action
  # dependency) with the minimum `contents: write` scope, isolated to this job.
  release-assets:
    name: Attach SBOM to Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: sbom
          path: sbom/
      - name: Attach SBOM to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          asset="sbom/authzen-llamafirewall-scanner.cdx.json"
          # Idempotent: upload to a release created from the UI, or create one if the tag was
          # pushed on its own. --clobber replaces a prior SBOM on a re-run.
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" "$asset" --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$tag" "$asset" --generate-notes --repo "$GITHUB_REPOSITORY"
          fi
