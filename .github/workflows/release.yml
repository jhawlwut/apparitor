name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build twine
      - run: python -m build
      - run: twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
      # Ship a CycloneDX SBOM of the runtime dependency tree alongside the release. Written
      # to sbom/ (not dist/) so it is not fed to `twine upload` in the publish job.
      - name: Generate SBOM (CycloneDX, runtime tree)
        run: scripts/generate_sbom.sh
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom/authzen-llamafirewall-scanner.cdx.json

  publish:
    needs: build
    runs-on: ubuntu-latest
    # PyPI Trusted Publishing (OIDC): no API token needed. Configure the publisher
    # in the PyPI project settings and create a "pypi" environment in repo settings.
    environment: pypi
    permissions:
      # OIDC for PyPI Trusted Publishing. Add `contents: write` only if a step also
      # creates a GitHub Release.
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
