name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false
      - run: uv pip install --system build twine
      - run: python -m build
      - run: twine check dist/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
      # Ship a CycloneDX SBOM of the runtime dependency tree alongside the release. Written
      # to sbom/ (not dist/) so it is not fed to `twine upload` in the publish job.
      - name: Generate SBOM (CycloneDX, runtime tree)
        run: scripts/generate_sbom.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom/apparitor.cdx.json

  # Gate publishing on the test suite so a tag push on a broken commit cannot reach
  # PyPI even if the build artifact was produced before the fault was introduced.
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false
      - run: uv pip install --system -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Ruff (format check)
        run: ruff format --check .
      - name: Mypy (strict)
        run: mypy src/
      - name: Pytest (unit suite)
        run: pytest

  publish:
    needs: [build, test]
    runs-on: ubuntu-latest
    # PyPI Trusted Publishing (OIDC): no API token needed. Configure the publisher
    # in the PyPI project settings and create a "pypi" environment in repo settings.
    environment: pypi
    permissions:
      # OIDC for PyPI Trusted Publishing. Add `contents: write` only if a step also
      # creates a GitHub Release.
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  # Attach the CycloneDX SBOM to the GitHub Release so it is durable and discoverable next to
  # the release, not a transient build artifact. Tagged releases only (a workflow_dispatch run
  # has no tag/release to attach to). Uses the first-party `gh` CLI (no extra action
  # dependency) with the minimum `contents: write` scope, isolated to this job.
  release-assets:
    name: Attach SBOM to Release
    needs: [build, test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom
          path: sbom/
      - name: Attach SBOM to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          asset="sbom/apparitor.cdx.json"
          # Idempotent: attach to a release created from the UI, or create one if the tag was
          # pushed on its own. --clobber replaces a prior SBOM on a re-run.
          #
          # Immutable releases reject asset changes after publish (HTTP 422). Treat only that
          # failure as non-fatal: the SBOM stays available as the `sbom` workflow artifact and
          # the release pipeline still succeeds. Any other upload error (network, permissions,
          # missing asset) still fails the job. A release the workflow creates itself (tag
          # pushed without a pre-created release) gets the SBOM at creation, before immutability
          # locks it.
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            upload_err="$(mktemp)"
            if ! gh release upload "$tag" "$asset" --clobber --repo "$GITHUB_REPOSITORY" 2>"$upload_err"; then
              if grep -qiE 'immutable|HTTP 422|Validation Failed' "$upload_err"; then
                echo "::warning::Could not attach the SBOM to release $tag because the release is immutable. The SBOM remains available as the 'sbom' workflow artifact. To attach it automatically, push the tag without pre-creating the release so this workflow creates the release with the SBOM."
              else
                cat "$upload_err" >&2
                rm -f "$upload_err"
                echo "::error::Failed to attach the SBOM to release $tag for a reason unrelated to release immutability."
                exit 1
              fi
            fi
            rm -f "$upload_err"
          else
            gh release create "$tag" "$asset" --generate-notes --repo "$GITHUB_REPOSITORY"
          fi
